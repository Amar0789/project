apiVersion: v1
kind: Pod
metadata: 
  name: nginx
  labels:
    env: dev
spec:
  containers:
  - name: nginx
    image: nginx

---
apiVersion: v1
kind: Service
metadata:
  name: svc 
spec:
  type: LoadBalancer
  selector:
    env: dev
  ports:
  - name: svc 
    protocol: "TCP"
    port: 82
    targetPort: 80